# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - edited
      - reopened
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ format('{0}-{1}-{2}-{3}-{4}', github.workflow, github.event_name, github.ref, github.base_ref || null, github.head_ref || null) }}
  cancel-in-progress: true

jobs:
  approval:
    name: Approval
    environment: PR
    runs-on: ubuntu-24.04
    steps:
      - name: Approve
        run: echo "Workflow was approved"

  dependency_review:
    needs: [approval]
    name: Dependency Review
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run Dependency Review
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2

  check_semantic_pr_title:
    needs: [approval]
    name: Check PR title
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    steps:
      - name: Run Semantic PR validation
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    needs: [approval]
    name: Fast repository validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            strategy-builder/package-lock.json
            strategy-builder/**/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0

      - name: Setup Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ github.token }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Install repository tools
        run: task tools
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install workspace dependencies
        run: task bootstrap

      - name: Run fast validation
        run: task validate:pr

  success:
    needs: [dependency_review, check_semantic_pr_title, validate]
    if: ${{ always() }}
    name: Pull Request Success
    runs-on: ubuntu-24.04
    steps:
      - name: Success
        run: |
          if [[ "${{ needs.dependency_review.result }}" == "success" && "${{ needs.check_semantic_pr_title.result }}" == "success" && "${{ needs.validate.result }}" == "success" ]]; then
            echo "All required checks passed."
          else
            echo "Some required checks did not pass."
            exit 1
          fi
