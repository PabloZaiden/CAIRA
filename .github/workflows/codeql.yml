# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "42 4 * * 0"

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            category: actions
            build-mode: none
          - language: javascript-typescript
            category: javascript
            build-mode: none
          - language: csharp
            category: csharp
            build-mode: manual
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        if: ${{ matrix.language == 'csharp' }}
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          config-file: ./.github/linters/.codeql.yml
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build C# project
        if: ${{ matrix.language == 'csharp' }}
        run: |
          set -euo pipefail
          project="reference-architectures/app/api/csharp/microsoft-agent-framework/Caira.Api.MicrosoftAgentFramework.csproj"
          dotnet restore "${project}"
          dotnet build "${project}" --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.category }}"
          upload: ${{ github.event_name == 'merge_group' && 'never' || 'always' }}
