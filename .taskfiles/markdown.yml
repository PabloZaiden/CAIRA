#  yaml-language-server: $schema=https://taskfile.dev/schema.json
# docs: https://taskfile.dev
---
version: "3"

includes:
  internal: internal.yml

tasks:
  # * Install markdownlint-cli2
  install:markdownlint:
    desc: Install markdownlint-cli2
    cmds:
      - task: internal:install:npm
        vars:
          APP: "markdownlint-cli2"

  # * Install markdown-table-formatter
  install:table-formatter:
    desc: Install markdown-table-formatter
    cmds:
      - task: internal:install:npm
        vars:
          APP: "markdown-table-formatter"

  # * Tools
  tools:
    desc: Install Markdown tools
    cmds:
      - task: install:markdownlint
      - task: install:table-formatter

  # * Frontmatter validation
  frontmatter:
    desc: Validate markdown frontmatter consistency
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cmd: ./.github/scripts/validate-markdown-frontmatter.sh

  frontmatter:check:
    desc: >-
      Validate markdown frontmatter with custom options (use -- to pass args)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - cmd: ./.github/scripts/validate-markdown-frontmatter.sh {{.CLI_ARGS}}

  # * Lint
  lint:
    desc: Lint Markdown files
    cmds:
      - cmd: |
          python3 <<'PY'
          import os
          import subprocess
          import sys

          root = os.getcwd()
          skip_dirs = {'.git', 'node_modules', '.terraform', '.venv', '.dev', 'dist', 'coverage', 'site'}
          files = []

          for base, dirs, filenames in os.walk(root):
              dirs[:] = [directory for directory in dirs if directory not in skip_dirs]
              for name in filenames:
                  if name.endswith('.md'):
                      files.append(os.path.relpath(os.path.join(base, name), root))

          files.sort()
          if not files:
              sys.exit(0)

          subprocess.run(
              ['markdownlint-cli2', '--config', './.github/linters/.markdownlint-cli2.yaml', *files],
              check=True
          )
          subprocess.run(['markdown-table-formatter', '--check', *files], check=True)
          PY
    dir: "{{.ROOT_DIR}}"
