#  yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

includes:
  internal: internal.yml

tasks:
  install:terraform:
    desc: Install Terraform
    cmds:
      - task: internal:install:brew:tap
        vars:
          APP: hashicorp/tap
      - task: internal:install:brew
        vars:
          APP: hashicorp/tap/terraform
      - cmd: |
          wget -O - https://apt.releases.hashicorp.com/gpg | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt -o DPkg::Lock::Timeout=-1 update \
            && sudo apt -o DPkg::Lock::Timeout=-1 install terraform -y
        platforms: [linux]

  install:terraform-docs:
    desc: Install Terraform Docs
    vars:
      TERRAFORM_DOCS_VERSION: "v0.21.0"
      TERRAFORM_DOCS_URL: "https://github.com/terraform-docs/terraform-docs/releases/download/{{.TERRAFORM_DOCS_VERSION}}/terraform-docs-{{.TERRAFORM_DOCS_VERSION}}-{{.OS}}-{{.ARCH}}.tar.gz"
    cmds:
      - task: internal:install:brew
        vars:
          APP: terraform-docs
      - cmd: |
          curl --location -o ~/terraform-docs.tar.gz "{{.TERRAFORM_DOCS_URL}}" \
            && tar -xf ~/terraform-docs.tar.gz --directory ~/ \
            && rm -f ~/terraform-docs.tar.gz \
            && chmod +x ~/terraform-docs \
            && sudo mv ~/terraform-docs /usr/local/bin/
        platforms: [linux]

  tools:
    desc: Install Terraform tools
    cmds:
      - task: install:terraform
      - task: install:terraform-docs

  lint:
    desc: Check Terraform formatting
    cmds:
      - terraform fmt -check -recursive reference-architectures/iac
    dir: "{{.ROOT_DIR}}"

  docs:
    desc: Generate Terraform documentation
    cmds:
      - terraform-docs -c ./.github/configs/.terraform-docs.yml reference-architectures/iac/foundry
      - terraform-docs -c ./.github/configs/.terraform-docs.yml reference-architectures/iac/container-apps
    dir: "{{.ROOT_DIR}}"

  clean:
    desc: Clean Terraform working files
    cmds:
      - find reference-architectures -name ".terraform" -type d -prune -exec rm -rf {} +
      - find reference-architectures -name ".terraform.lock.hcl" -type f -delete
      - find reference-architectures -name "*.tfstate*" -type f -delete
    dir: "{{.ROOT_DIR}}"
