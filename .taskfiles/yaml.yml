#  yaml-language-server: $schema=https://taskfile.dev/schema.json
# docs: https://taskfile.dev
---
version: "3"

includes:
  internal: internal.yml

tasks:
  # * Install YAMLlint
  install:yamllint:
    desc: Install YAMLlint
    cmds:
      - task: internal:install:uv
        vars:
          APP: yamllint

  # * Tools
  tools:
    desc: Install YAML tools
    cmds:
      - task: install:yamllint

  # * Lint
  lint:
    desc: Lint YAML files
    cmds:
      - cmd: |
          python3 <<'PY'
          import os
          import subprocess
          import sys

          root = os.getcwd()
          skip_dirs = {'.git', 'node_modules', '.terraform', '.venv', '.dev', 'dist', 'coverage', 'site'}
          files = []

          for base, dirs, filenames in os.walk(root):
              dirs[:] = [directory for directory in dirs if directory not in skip_dirs]
              for name in filenames:
                  if name.endswith(('.yml', '.yaml')):
                      files.append(os.path.relpath(os.path.join(base, name), root))

          files.sort()
          if not files:
              sys.exit(0)

          subprocess.run(
              ['yamllint', '-c', './.github/linters/.yamllint.yml', '--format', 'auto', '--strict', *files],
              check=True
          )
          PY
    dir: "{{.ROOT_DIR}}"
