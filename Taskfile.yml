#  yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

includes:
  internal:
    taskfile: .taskfiles/internal.yml
  env:
    taskfile: .taskfiles/environment.yml
  sh:
    taskfile: .taskfiles/bash.yml
  gh:
    taskfile: .taskfiles/github.yml
  js:
    taskfile: .taskfiles/javascript.yml
  md:
    taskfile: .taskfiles/markdown.yml
  sec:
    taskfile: .taskfiles/security.yml
  spell:
    taskfile: .taskfiles/spell.yml
  tf:
    taskfile: .taskfiles/terraform.yml
  yml:
    taskfile: .taskfiles/yaml.yml
  site:
    taskfile: .taskfiles/site.yml

tasks:
  default:
    desc: Default task
    silent: true
    cmds:
      - cmd: task --list
        ignore_error: true

  tools:
    desc: Install repository tools
    cmds:
      - task: env:tools
      - task: sh:tools
      - task: gh:tools
      - task: js:tools
      - task: md:tools
      - task: sec:tools
      - task: spell:tools
      - task: tf:tools
      - task: yml:tools
      - task: site:tools

  bootstrap:
    desc: Install reference component dependencies
    cmds:
      - ./scripts/bootstrap.sh

  validate:
    desc: Validate every reference component
    deps:
      - task: bootstrap
    cmds:
      - ./scripts/validate.sh

  lint:
    desc: Run repository-level static checks
    cmds:
      - task: sh:lint
      - task: gh:lint
      - task: md:lint
      - task: sec:lint
      - task: spell:lint
      - task: yml:lint

  test:
    desc: Alias for component validation
    cmds:
      - task: validate

  validate:pr:
    desc: Run pull request validation
    cmds:
      - task: lint
      - task: validate
      - task site:build -- --strict

  clean:
    desc: Clean generated outputs
    cmds:
      - task: tf:clean
      - task: site:clean
      - find reference-architectures -type d \( -name node_modules -o -name dist -o -name bin -o -name obj -o -name .terraform \) -prune -exec rm -rf {} +
