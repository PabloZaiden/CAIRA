# CAIRA Deployment Strategy: C# + Microsoft Agent Framework + ACA
#
# Self-contained deployment strategy — all source code is included in this directory.
# Authentication uses DefaultAzureCredential via the az credential sidecar.
#
# Prerequisites:
#   1. Create the azurecli Docker volume and log in:
#      docker volume create azurecli
#      docker run -it --rm -v azurecli:/root/.azure mcr.microsoft.com/azure-cli az login --use-device-code
#   2. Copy .env.example to .env and fill in your Azure values.
#
# Usage:
#   cp .env.example .env
#   # Edit .env with your Azure values
#   docker compose up --build

---

services:
  azcred:
    build:
      context: ./azcred
    volumes:
      - azurecli:/app/.azure
    networks:
      - caira-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8079/health"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:8080"
    environment:
      API_BASE_URL: http://api:4000
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - caira-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

  api:
    build:
      context: ./api
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      AGENT_SERVICE_URL: http://agent:3000
      IDENTITY_ENDPOINT: http://azcred:8079/token
      IMDS_ENDPOINT: dummy_required_value
      SKIP_AUTH: "true"
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      agent:
        condition: service_healthy
      azcred:
        condition: service_healthy
    networks:
      - caira-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

  agent:
    build:
      context: ./agent
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      IDENTITY_ENDPOINT: http://azcred:8079/token
      IMDS_ENDPOINT: dummy_required_value
      SKIP_AUTH: "true"
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-03-01-preview}
      AGENT_MODEL: ${AGENT_MODEL:-gpt-5.2-chat}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      azcred:
        condition: service_healthy
    networks:
      - caira-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  caira-net:
    driver: bridge

volumes:
  azurecli:
    external: true
